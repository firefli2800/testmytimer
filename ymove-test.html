<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>YMove Test</title>
<style>
body{
  font-family:Arial,sans-serif;
  background:#0f0f0f;
  color:#fff;
  padding:24px;
  max-width:1100px;
  margin:0 auto;
}
h1{margin-bottom:6px}
p{color:#bbb}
.panel{
  background:#171717;
  border:1px solid #333;
  border-radius:12px;
  padding:16px;
  margin:16px 0;
}
input,button{
  padding:12px;
  font-size:16px;
  border-radius:8px;
  border:1px solid #444;
}
input{
  width:320px;
  max-width:100%;
  background:#0b0b0b;
  color:#fff;
}
button{
  cursor:pointer;
  background:#fff;
  color:#000;
  font-weight:bold;
}
.result{
  padding:12px;
  border:1px solid #333;
  border-radius:10px;
  margin:10px 0;
  background:#1d1d1d;
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:center;
}
.result small{color:#aaa}
video{
  width:100%;
  max-width:760px;
  background:#000;
  margin-top:12px;
  border-radius:12px;
}
#status{
  margin-top:12px;
  color:#bbb;
}
pre{
  white-space:pre-wrap;
  word-break:break-word;
  max-height:280px;
  overflow:auto;
  background:#090909;
  border:1px solid #333;
  border-radius:10px;
  padding:12px;
  color:#ddd;
}
</style>
</head>
<body>

<h1>YMove Test</h1>
<p>Temporary test page. This confirms YMove search and video playback through Firebase Functions.</p>

<div class="panel">
  <input id="searchBox" placeholder="Search exercise, example: squat" value="squat">
  <button onclick="searchExercises()">Search YMove</button>
  <div id="status"></div>
</div>

<div class="panel">
  <h2>Results</h2>
  <div id="results"></div>
</div>

<div class="panel">
  <h2>Preview</h2>
  <div id="selectedName"></div>
  <video id="previewVideo" controls muted playsinline></video>
</div>

<div class="panel">
  <h2>Raw Response Debug</h2>
  <pre id="debugBox">Search something first.</pre>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-functions.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAR7B5phYOnasZkBQyqut56i_DKA8HFJz0",
  authDomain: "timer-app-30e7d.firebaseapp.com",
  databaseURL: "https://timer-app-30e7d-default-rtdb.firebaseio.com",
  projectId: "timer-app-30e7d",
  storageBucket: "timer-app-30e7d.firebasestorage.app"
};

firebase.initializeApp(firebaseConfig);

const functions = firebase.app().functions("us-central1");

const searchYMoveExercises = functions.httpsCallable("searchYMoveExercises");
const getYMoveExercise = functions.httpsCallable("getYMoveExercise");

const searchBox = document.getElementById("searchBox");
const statusEl = document.getElementById("status");
const resultsEl = document.getElementById("results");
const selectedNameEl = document.getElementById("selectedName");
const previewVideo = document.getElementById("previewVideo");
const debugBox = document.getElementById("debugBox");

function showDebug(label, value) {
  debugBox.textContent = label + "\n\n" + JSON.stringify(value, null, 2);
}

function unwrapApiData(apiResponse) {
  if (!apiResponse) return apiResponse;

  // Firebase callable response gives us response.data.
  // YMove also wraps its response inside data.
  // So sometimes the actual object is response.data.data.
  return apiResponse.data || apiResponse;
}

function getExerciseArray(apiResponse) {
  const data = unwrapApiData(apiResponse) || {};

  if (Array.isArray(data)) return data;
  if (Array.isArray(data.exercises)) return data.exercises;
  if (Array.isArray(data.results)) return data.results;
  if (Array.isArray(data.data)) return data.data;
  if (data.data && Array.isArray(data.data.exercises)) return data.data.exercises;
  if (data.data && Array.isArray(data.data.results)) return data.data.results;

  return [];
}

function getExerciseId(exercise) {
  return exercise.id || exercise.exerciseId || exercise.slug || exercise._id || "";
}

function getExerciseName(exercise) {
  return exercise.title || exercise.name || exercise.displayName || exercise.exerciseName || "Unnamed Exercise";
}

function getVideoUrl(exercise) {
  if (!exercise) return "";

  // Prefer portrait / primary videos for the vertical screen system.
  if (Array.isArray(exercise.videos) && exercise.videos.length) {
    const portraitPrimary = exercise.videos.find(video =>
      video.orientation === "portrait" && video.isPrimary && video.videoUrl
    );

    if (portraitPrimary) return portraitPrimary.videoUrl;

    const portrait = exercise.videos.find(video =>
      video.orientation === "portrait" && video.videoUrl
    );

    if (portrait) return portrait.videoUrl;

    const primary = exercise.videos.find(video =>
      video.isPrimary && video.videoUrl
    );

    if (primary) return primary.videoUrl;

    const firstWithUrl = exercise.videos.find(video => video.videoUrl);

    if (firstWithUrl) return firstWithUrl.videoUrl;
  }

  // Fallbacks.
  if (typeof exercise.videoUrl === "string") return exercise.videoUrl;
  if (typeof exercise.video_url === "string") return exercise.video_url;
  if (typeof exercise.videoHlsUrl === "string") return exercise.videoHlsUrl;
  if (typeof exercise.video_hls_url === "string") return exercise.video_hls_url;
  if (typeof exercise.video === "string") return exercise.video;

  return "";
}

async function searchExercises() {
  const q = searchBox.value.trim();

  statusEl.textContent = "Searching...";
  resultsEl.innerHTML = "";
  previewVideo.removeAttribute("src");
  selectedNameEl.textContent = "";

  try {
    const response = await searchYMoveExercises({
      q,
      limit: 25,
      hasVideo: true
    });

    showDebug("Search response:", response.data);

    const exercises = getExerciseArray(response.data);

    if (!exercises.length) {
      statusEl.textContent = "No exercises found. Look at Raw Response Debug.";
      return;
    }

    statusEl.textContent = `Found ${exercises.length} exercises.`;

    exercises.forEach(exercise => {
      const id = getExerciseId(exercise);
      const name = getExerciseName(exercise);

      const div = document.createElement("div");
      div.className = "result";

      const info = document.createElement("div");
      info.innerHTML = `
        <strong>${name}</strong><br>
        <small>ID: ${id || "missing"}</small>
      `;

      const button = document.createElement("button");
      button.textContent = "Preview";
      button.onclick = () => previewExercise(id, name);

      div.appendChild(info);
      div.appendChild(button);
      resultsEl.appendChild(div);
    });

  } catch (error) {
    console.error(error);
    showDebug("Search error:", error);
    statusEl.textContent = "Error searching YMove: " + error.message;
  }
}

async function previewExercise(id, name) {
  if (!id) {
    statusEl.textContent = "Missing exercise ID.";
    return;
  }

  statusEl.textContent = "Loading preview...";
  selectedNameEl.textContent = name;

  try {
    const response = await getYMoveExercise({ id });

    // This is the important fix:
    // response.data is the Firebase callable response body.
    // response.data.data is the actual YMove exercise.
    const exerciseResponse = response.data;
    const exercise = unwrapApiData(exerciseResponse);

    showDebug("Exercise detail response:", exerciseResponse);

    const videoUrl = getVideoUrl(exercise);

    if (!videoUrl) {
      statusEl.textContent = "Exercise loaded, but no video URL was found. Raw response is shown below.";
      return;
    }

    previewVideo.src = videoUrl;
    previewVideo.load();
    statusEl.textContent = "Preview loaded.";

  } catch (error) {
    console.error(error);
    showDebug("Preview error:", error);
    statusEl.textContent = "Error loading exercise: " + error.message;
  }
}
</script>

</body>
</html>
