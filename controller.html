<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Controller</title>
<style>
body{font-family:Arial,sans-serif;padding:20px}
button{margin:5px;padding:10px 14px;font-size:16px}
</style>
</head>
<body>

<h2>Controller</h2>

<button onclick="play()">Play</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset</button>
<button onclick="prev()">Previous</button>
<button onclick="next()">Next</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAR7B5phYOnasZkBQyqut56i_DKA8HFJz0",
  authDomain: "timer-app-30e7d.firebaseapp.com",
  databaseURL: "https://timer-app-30e7d-default-rtdb.firebaseio.com",
  projectId: "timer-app-30e7d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const BLOCK_PATTERN = [45, 15, 45, 15, 45, 15, 60];
const durations = [180, ...Array.from({ length: 6 }, () => BLOCK_PATTERN).flat(), 180];

function defaultState() {
  return {
    startTime: Date.now(),
    paused: true,
    elapsed: 0
  };
}

function withState(callback) {
  db.ref("state").once("value", (snap) => {
    callback({ ...defaultState(), ...(snap.val() || {}) });
  });
}

function totalDurationMs() {
  return durations.reduce((sum, seconds) => sum + (seconds * 1000), 0);
}

function clampElapsed(ms) {
  return Math.max(0, Math.min(ms, totalDurationMs()));
}

function currentElapsedMs(state) {
  const raw = state.paused
    ? state.elapsed
    : (Date.now() - state.startTime);

  return clampElapsed(raw || 0);
}

function findSegmentIndex(elapsedMs) {
  let cursor = 0;

  for (let i = 0; i < durations.length; i += 1) {
    cursor += durations[i] * 1000;
    if (elapsedMs < cursor) return i;
  }

  return durations.length - 1;
}

function segmentStartMs(index) {
  let cursor = 0;
  for (let i = 0; i < index; i += 1) {
    cursor += durations[i] * 1000;
  }
  return cursor;
}

function seekTo(targetMs) {
  withState((state) => {
    const clamped = clampElapsed(targetMs);
    const updates = {
      startTime: Date.now() - clamped,
      paused: state.paused
    };

    if (state.paused) updates.elapsed = clamped;

    db.ref("state").update(updates);
  });
}

function play() {
  withState((state) => {
    db.ref("state").update({
      paused: false,
      startTime: Date.now() - (state.elapsed || 0)
    });
  });
}

function pauseTimer() {
  withState((state) => {
    if (state.paused) return;

    db.ref("state").update({
      paused: true,
      elapsed: currentElapsedMs(state)
    });
  });
}

function resetTimer() {
  db.ref("state").set({
    startTime: Date.now(),
    paused: true,
    elapsed: 0
  });
}

function next() {
  withState((state) => {
    const elapsedMs = currentElapsedMs(state);
    const currentIndex = findSegmentIndex(elapsedMs);
    const targetMs = currentIndex >= durations.length - 1
      ? totalDurationMs()
      : segmentStartMs(currentIndex + 1);

    seekTo(targetMs);
  });
}

function prev() {
  withState((state) => {
    const elapsedMs = currentElapsedMs(state);
    const currentIndex = findSegmentIndex(elapsedMs);
    const targetMs = currentIndex <= 0
      ? 0
      : segmentStartMs(currentIndex - 1);

    seekTo(targetMs);
  });
}
</script>

</body>
</html>
