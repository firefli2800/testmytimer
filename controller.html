<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Controller</title>
<style>
body{font-family:Arial;padding:20px}
button{margin:5px;padding:10px}
</style>
</head>

<body>

<h2>Controller</h2>

<button onclick="play()">Play</button>
<button onclick="pause()">Pause</button>
<button onclick="stopVideo()">Stop Video</button>
<button onclick="resumeVideo()">Resume Video</button>
<button onclick="reset()">Reset</button>
<button onclick="next()">Next</button>
<button onclick="prev()">Previous</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAR7B5phYOnasZkBQyqut56i_DKA8HFJz0",
  authDomain: "timer-app-30e7d.firebaseapp.com",
  databaseURL: "https://timer-app-30e7d-default-rtdb.firebaseio.com",
  projectId: "timer-app-30e7d",
  storageBucket: "timer-app-30e7d.firebasestorage.app",
  messagingSenderId: "715490093829",
  appId: "1:715490093829:web:e4591166f3be6d9722e56c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* PLAY */
function play(){
  db.ref("state").once("value", snap=>{
    const s = snap.val();
    const newStart = Date.now() - (s.elapsed || 0);

    db.ref("state").update({
      paused:false,
      videoStopped:false,
      startTime:newStart
    });
  });
}

/* PAUSE */
function pause(){
  db.ref("state").once("value", snap=>{
    const s = snap.val();
    const elapsed = Date.now() - s.startTime;

    db.ref("state").update({
      paused:true,
      elapsed:elapsed
    });
  });
}

/* STOP VIDEO */
function stopVideo(){
  db.ref("state").update({
    videoStopped:true
  });
}

/* RESUME VIDEO */
function resumeVideo(){
  db.ref("state").update({
    videoStopped:false
  });
}

/* RESET */
function reset(){
  db.ref("state").set({
    index:0,
    startTime:Date.now(),
    paused:false,
    videoStopped:false,
    elapsed:0
  });
}

/* NEXT */
function next(){
  db.ref("state").once("value",snap=>{
    const s=snap.val();

    db.ref("state").update({
      index:s.index+1,
      startTime:Date.now(),
      videoStopped:false,
      elapsed:0
    });
  });
}

/* PREV */
function prev(){
  db.ref("state").once("value",snap=>{
    const s=snap.val();

    db.ref("state").update({
      index:Math.max(0,s.index-1),
      startTime:Date.now(),
      videoStopped:false,
      elapsed:0
    });
  });
}
</script>

</body>
</html>
