<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Controller</title>
<style>
body{font-family:Arial;padding:20px}
button{margin:5px;padding:10px}
</style>
</head>

<body>

<h2>Controller</h2>

<button onclick="play()">Play</button>
<button onclick="pause()">Pause</button>
<button onclick="stopVideo()">Stop Video</button>
<button onclick="reset()">Reset</button>
<button onclick="next()">Next</button>
<button onclick="prev()">Previous</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAR7B5phYOnasZkBQyqut56i_DKA8HFJz0",
  authDomain: "timer-app-30e7d.firebaseapp.com",
  databaseURL: "https://timer-app-30e7d-default-rtdb.firebaseio.com",
  projectId: "timer-app-30e7d",
  storageBucket: "timer-app-30e7d.firebasestorage.app",
  messagingSenderId: "715490093829",
  appId: "1:715490093829:web:e4591166f3be6d9722e56c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function play(){
  db.ref("state").update({
    paused:false,
    videoStopped:false,
    startTime: Date.now()
  });
}

function pause(){
  db.ref("state").update({
    paused:true
  });
}

function stopVideo(){
  db.ref("state").update({
    videoStopped:true
  });
}

function reset(){
  db.ref("state").set({
    index:0,
    startTime:Date.now(),
    paused:false,
    videoStopped:false
  });
}

function next(){
  db.ref("state").once("value",snap=>{
    const s=snap.val();
    db.ref("state").update({
      index:s.index+1,
      startTime:Date.now(),
      videoStopped:false
    });
  });
}

function prev(){
  db.ref("state").once("value",snap=>{
    const s=snap.val();
    db.ref("state").update({
      index:Math.max(0,s.index-1),
      startTime:Date.now(),
      videoStopped:false
    });
  });
}
</script>

</body>
</html>
