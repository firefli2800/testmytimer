<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Display</title>

<style>
html,body{margin:0;height:100%;background:black;color:white;font-family:Arial}
video{position:fixed;top:0;left:0;width:100vw;height:100vh;object-fit:cover}
#overlay{position:fixed;top:20px;right:30px;z-index:10}
#label{font-size:40px}
#timer{font-size:80px}
#center{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:100px;display:none}
</style>
</head>

<body>

<!-- 🔥 TWO VIDEO BUFFERS -->
<video id="videoA" muted playsinline loop></video>
<video id="videoB" muted playsinline loop style="display:none"></video>

<div id="overlay">
  <div id="label">LOADING...</div>
  <div id="timer">00:00</div>
</div>

<div id="center"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAR7B5phYOnasZkBQyqut56i_DKA8HFJz0",
  authDomain: "timer-app-30e7d.firebaseapp.com",
  databaseURL: "https://timer-app-30e7d-default-rtdb.firebaseio.com",
  projectId: "timer-app-30e7d",
  storageBucket: "timer-app-30e7d.firebasestorage.app",
  messagingSenderId: "715490093829",
  appId: "1:715490093829:web:e4591166f3be6d9722e56c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 🔥 VIDEO ELEMENTS */
const videoA = document.getElementById("videoA");
const videoB = document.getElementById("videoB");

let activeVideo = "A";

function getCurrentVideo(){
  return activeVideo === "A" ? videoA : videoB;
}

function getNextVideo(){
  return activeVideo === "A" ? videoB : videoA;
}

function switchVideo(){
  const current = getCurrentVideo();
  const next = getNextVideo();

  current.style.display = "none";
  next.style.display = "block";

  next.currentTime = 0; // 🔥 restart clean
  next.play().catch(()=>{});

  activeVideo = activeVideo === "A" ? "B" : "A";
}

/* 🔥 VIDEO MAP */
const videos = {
  warmup: "https://firebasestorage.googleapis.com/v0/b/timer-app-30e7d.firebasestorage.app/o/Back%20Opener.mp4?alt=media&token=b1db24b5-370e-4f86-ac23-e6c5f269fb8e",
  workout1: "https://firebasestorage.googleapis.com/v0/b/timer-app-30e7d.firebasestorage.app/o/Back%20Opener.mp4?alt=media&token=b1db24b5-370e-4f86-ac23-e6c5f269fb8e",
  workout2: "https://firebasestorage.googleapis.com/v0/b/timer-app-30e7d.firebasestorage.app/o/Cat%20Cow.mp4?alt=media&token=e81ab0f9-67dc-4145-8494-614a47b121e9",
  workout3: "https://firebasestorage.googleapis.com/v0/b/timer-app-30e7d.firebasestorage.app/o/Dynamic%2090-90%20Hip%20Twist.mp4?alt=media&token=cb9f2e38-4de6-48ca-a29b-cd94a7531aed",
  workout4: "https://firebasestorage.googleapis.com/v0/b/timer-app-30e7d.firebasestorage.app/o/Squat%20Side%20Bends(1).mp4?alt=media&token=368da077-c114-4024-8109-2716cb2b32ab",
  stretch: "https://firebasestorage.googleapis.com/v0/b/timer-app-30e7d.firebasestorage.app/o/Back%20Opener.mp4?alt=media&token=b1db24b5-370e-4f86-ac23-e6c5f269fb8e"
};

/* 🔥 PRELOAD SYSTEM */
const videoCache = {};

function preloadAllVideos(){
  Object.keys(videos).forEach(key => {
    const v = document.createElement("video");
    v.src = videos[key];
    v.preload = "auto";
    v.muted = true;
    videoCache[key] = v;
  });
}

function useCachedVideo(key){
  const next = getNextVideo();
  next.src = videoCache[key].src;
  next.load();
}

/* 🔥 UI */
const label = document.getElementById("label");
const timer = document.getElementById("timer");
const center = document.getElementById("center");

/* 🔥 TIMELINE */
const timeline = [];

timeline.push({type:"video",label:"WARMUP",duration:360,video:"warmup"});

function addBlock(n){
  for(let i=1;i<=3;i++){
    timeline.push({type:"video",label:`WORK ${n}-${i}`,duration:45,video:`workout${n}`});
    timeline.push({type:"rest",label:"REST",duration:15});
  }
  timeline.push({type:"break",label:"BREAK",duration:60,next:`workout${n+1}`});
}

addBlock(1); addBlock(2); addBlock(3); addBlock(4);

timeline.push({type:"video",label:"STRETCH",duration:360,video:"stretch"});

/* 🔥 FIREBASE STATE */
let state = null;
let lastIndex = -1; // 🔥 NEW FIX

db.ref("state").on("value", snap=>{
  state = snap.val();
});

/* 🔥 MAIN LOOP */
setInterval(()=>{
  if(!state || state.paused) return;

  const segment = timeline[state.index];
  if(!segment) return;

  const elapsed = Math.floor((Date.now() - state.startTime)/1000);
  const remain = segment.duration - elapsed;

  label.innerText = segment.label;
  updateTimer(remain);

  /* 🔥 FIXED VIDEO SWITCH LOGIC */
  if(state.index !== lastIndex){
    lastIndex = state.index;

    if(segment.type === "video"){
      center.style.display = "none";
      useCachedVideo(segment.video);
      switchVideo();
    }

    if(segment.type === "rest"){
      getCurrentVideo().pause();
      getCurrentVideo().style.display = "none";
      center.innerText = "REST";
      center.style.display = "block";
    }

    if(segment.type === "break"){
      getCurrentVideo().pause();
      getCurrentVideo().style.display = "none";
      center.innerText = "BREAK";
      center.style.display = "block";
    }
  }

  /* 🔥 PREVIEW */
  if(segment.type==="break" && remain <= 15){
    center.innerText="NEXT";
    useCachedVideo(segment.next);
    switchVideo();
  }

},250);

/* 🔥 TIMER */
function updateTimer(s){
  s=Math.max(0,s);
  const m=Math.floor(s/60);
  const sec=s%60;
  timer.innerText=`${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

/* 🔥 INIT */
preloadAllVideos();
</script>

</body>
</html>
