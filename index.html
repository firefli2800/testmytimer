<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Gym Display</title>

<style>
  html, body {
    margin: 0;
    height: 100%;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
  }

  video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
  }

  #overlay {
    position: fixed;
    top: 20px;
    right: 30px;
    text-align: right;
    z-index: 10;
  }

  #label {
    font-size: 40px;
    font-weight: bold;
    text-shadow: 0 0 10px black;
  }

  #timer {
    font-size: 80px;
    text-shadow: 0 0 10px black;
  }

  #centerText {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 100px;
    font-weight: bold;
    display: none;
    z-index: 20;
  }
</style>
</head>

<body>

<video id="video" muted playsinline loop></video>

<div id="overlay">
  <div id="label">READY</div>
  <div id="timer">00:00</div>
</div>

<div id="centerText"></div>

<script>
const video = document.getElementById("video");
const label = document.getElementById("label");
const timer = document.getElementById("timer");
const centerText = document.getElementById("centerText");

// 🔧 VIDEO PLACEHOLDERS (CHANGE THESE)
const videos = {
  warmup: "VIDEO_URL",
  workout1: "https://firebasestorage.googleapis.com/v0/b/timer-app-30e7d.firebasestorage.app/o/Back%20Opener.mp4?alt=media&token=b1db24b5-370e-4f86-ac23-e6c5f269fb8e",
  workout2: "https://firebasestorage.googleapis.com/v0/b/timer-app-30e7d.firebasestorage.app/o/Cat%20Cow.mp4?alt=media&token=e81ab0f9-67dc-4145-8494-614a47b121e9",
  workout3: "https://firebasestorage.googleapis.com/v0/b/timer-app-30e7d.firebasestorage.app/o/Dynamic%2090-90%20Hip%20Twist.mp4?alt=media&token=cb9f2e38-4de6-48ca-a29b-cd94a7531aed",
  workout4: "https://firebasestorage.googleapis.com/v0/b/timer-app-30e7d.firebasestorage.app/o/Squat%20Side%20Bends(1).mp4?alt=media&token=368da077-c114-4024-8109-2716cb2b32ab",
  stretch: "VIDEO_URL"
};

// 🔧 WORKOUT PLAN (timeline engine)
const timeline = [];

// Warmup
timeline.push({ type: "video", label: "WARMUP", duration: 360, video: "warmup" });

// Function to add workout blocks
function addWorkoutBlock(name) {
  for (let i = 1; i <= 3; i++) {
    timeline.push({
      type: "video",
      label: `WORK ${name}-${i}`,
      duration: 45,
      video: `workout${name}`
    });

    timeline.push({
      type: "rest",
      label: "REST",
      duration: 15
    });
  }

  timeline.push({
    type: "break",
    label: "BREAK",
    duration: 60,
    next: `workout${parseInt(name) + 1}`
  });
}

// Add all 4 workout sections
addWorkoutBlock("1");
addWorkoutBlock("2");
addWorkoutBlock("3");
addWorkoutBlock("4");

// Stretch
timeline.push({ type: "video", label: "STRETCH", duration: 360, video: "stretch" });

// STATE
let index = 0;
let startTime = Date.now();

// Load video helper
function loadVideo(key) {
  const url = videos[key];
  video.src = url + "&t=" + Date.now();
  video.load();
  video.play().catch(() => {
    document.body.addEventListener("click", () => video.play());
  });
}

// MAIN LOOP
setInterval(() => {
  const segment = timeline[index];
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const remain = segment.duration - elapsed;

  label.innerText = segment.label;
  updateTimer(remain);

  // HANDLE TYPES
  if (segment.type === "video") {
    centerText.style.display = "none";
    video.style.display = "block";

    if (!video.src.includes(videos[segment.video])) {
      loadVideo(segment.video);
    }
  }

  if (segment.type === "rest") {
    video.pause();
    video.style.display = "none";
    centerText.innerText = "REST";
    centerText.style.display = "block";
  }

  if (segment.type === "break") {
    video.pause();
    video.style.display = "none";
    centerText.style.display = "block";

    if (remain <= 15 && segment.next && videos[segment.next]) {
      centerText.innerText = "NEXT";
      video.style.display = "block";
      loadVideo(segment.next);
    } else {
      centerText.innerText = "BREAK";
    }
  }

  // MOVE TO NEXT SEGMENT
  if (remain <= 0) {
    index++;
    if (index >= timeline.length) {
      index = 0; // loop workout
    }
    startTime = Date.now();
  }

}, 250);

// TIMER FORMAT
function updateTimer(seconds) {
  const s = Math.max(0, seconds);
  const m = Math.floor(s / 60);
  const sec = s % 60;

  timer.innerText =
    `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
}
</script>

</body>
</html>
