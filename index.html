<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Display</title>

<style>
html,body{margin:0;height:100%;background:black;color:white;font-family:Arial}
video{position:fixed;top:0;left:0;width:100vw;height:100vh;object-fit:cover}
#overlay{position:fixed;top:20px;right:30px;z-index:10}
#label{font-size:40px}
#timer{font-size:80px}
#center{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:100px;
  display:none;
}
</style>
</head>

<body>

<video id="video" muted playsinline></video>

<div id="overlay">
  <div id="label"></div>
  <div id="timer"></div>
</div>

<div id="center"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAR7B5phYOnasZkBQyqut56i_DKA8HFJz0",
  authDomain: "timer-app-30e7d.firebaseapp.com",
  databaseURL: "https://timer-app-30e7d-default-rtdb.firebaseio.com",
  projectId: "timer-app-30e7d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const video = document.getElementById("video");
const label = document.getElementById("label");
const timer = document.getElementById("timer");
const center = document.getElementById("center");

const videos = {
  warmup:"https://firebasestorage.googleapis.com/v0/b/timer-app-30e7d.firebasestorage.app/o/Back%20Opener.mp4?alt=media&token=b1db24b5-370e-4f86-ac23-e6c5f269fb8e",
  workout1:"https://firebasestorage.googleapis.com/v0/b/timer-app-30e7d.firebasestorage.app/o/Back%20Opener.mp4?alt=media&token=b1db24b5-370e-4f86-ac23-e6c5f269fb8e",
  workout2:"https://firebasestorage.googleapis.com/v0/b/timer-app-30e7d.firebasestorage.app/o/Cat%20Cow.mp4?alt=media&token=e81ab0f9-67dc-4145-8494-614a47b121e9",
  workout3:"https://firebasestorage.googleapis.com/v0/b/timer-app-30e7d.firebasestorage.app/o/Dynamic%2090-90%20Hip%20Twist.mp4?alt=media&token=cb9f2e38-4de6-48ca-a29b-cd94a7531aed",
  workout4:"https://firebasestorage.googleapis.com/v0/b/timer-app-30e7d.firebasestorage.app/o/Squat%20Side%20Bends(1).mp4?alt=media&token=368da077-c114-4024-8109-2716cb2b32ab",

  /* 🔥 NEW: STRETCH PLACEHOLDER */
  stretch:"https://firebasestorage.googleapis.com/v0/b/timer-app-30e7d.firebasestorage.app/o/Back%20Opener.mp4?alt=media&token=b1db24b5-370e-4f86-ac23-e6c5f269fb8e"
};

/* TIMELINE */
const timeline=[];

timeline.push({type:"video",label:"WARMUP",duration:360,video:"warmup"});

function addBlock(n){
  for(let i=1;i<=3;i++){
    timeline.push({type:"video",label:`WORK ${n}-${i}`,duration:45,video:`workout${n}`});
    timeline.push({type:"rest",duration:15});
  }
  timeline.push({type:"break",duration:60});
}

addBlock(1);
addBlock(2);
addBlock(3);
addBlock(4);

/* 🔥 NEW: FINAL STRETCH SEGMENT */
timeline.push({
  type:"video",
  label:"STRETCH",
  duration:360,
  video:"stretch"
});

let state=null;
let lastSegmentIndex = -1;

db.ref("state").on("value",snap=>{
  state=snap.val();
});

setInterval(()=>{
  if(!state) return;

  let elapsed = state.paused
    ? state.elapsed
    : (Date.now() - state.startTime);

  let total = 0;
  let segment = null;
  let segmentElapsed = 0;
  let currentSegmentIndex = -1;

  for(let i=0;i<timeline.length;i++){
    const seg = timeline[i];

    if(elapsed < total + seg.duration*1000){
      segment = seg;
      segmentElapsed = elapsed - total;
      currentSegmentIndex = i;
      break;
    }

    total += seg.duration*1000;
  }

  if(!segment) return;

  const remain = segment.duration - Math.floor(segmentElapsed/1000);

  label.innerText = segment.label || "";
  timer.innerText = format(remain);

  if(state.paused){
    video.pause();
    return;
  }

  /* REST / BREAK */
  if(segment.type === "rest" || segment.type === "break"){
    video.pause();
    video.style.display="none";

    center.innerText = segment.type==="rest" ? "REST" : "BREAK";
    center.style.display="block";

    lastSegmentIndex = currentSegmentIndex;
    return;
  }

  /* VIDEO SEGMENT */
  center.style.display="none";
  video.style.display="block";

  const src = videos[segment.video];

  if(currentSegmentIndex !== lastSegmentIndex){
    lastSegmentIndex = currentSegmentIndex;

    video.pause();
    video.src = src;
    video.currentTime = 0;
    video.load();

    video.play().catch(()=>{});
  }

},250);

function format(s){
  s=Math.max(0,s);
  const m=Math.floor(s/60);
  const sec=s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
</script>

</body>
</html>
