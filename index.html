<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Gym Display + Controller</title>

<style>
  html, body {
    margin: 0;
    height: 100%;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
  }

  video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
  }

  #overlay {
    position: fixed;
    top: 20px;
    right: 30px;
    text-align: right;
    z-index: 10;
  }

  #label { font-size: 40px; font-weight: bold; }
  #timer { font-size: 80px; }

  #centerText {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 100px;
    font-weight: bold;
    display: none;
    z-index: 20;
  }

  /* 🔥 CONTROLLER UI */
  #controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 30;
  }

  button {
    margin: 5px;
    padding: 10px 15px;
    font-size: 14px;
    cursor: pointer;
  }
</style>
</head>

<body>

<video id="video" muted playsinline loop></video>

<div id="overlay">
  <div id="label">READY</div>
  <div id="timer">00:00</div>
</div>

<div id="centerText"></div>

<!-- 🔥 CONTROLLER -->
<div id="controls">
  <button onclick="play()">Play / Resume</button>
  <button onclick="pause()">Pause</button>
  <button onclick="stop()">Stop Video</button>
  <button onclick="reset()">Reset</button>
  <button onclick="nextSegment()">Next</button>
  <button onclick="prevSegment()">Previous</button>
</div>

<script>
const video = document.getElementById("video");
const label = document.getElementById("label");
const timer = document.getElementById("timer");
const centerText = document.getElementById("centerText");

// CONFIG
const videos = {
  warmup: "VIDEO_URL",
  workout1: "VIDEO_URL",
  workout2: "VIDEO_URL",
  workout3: "VIDEO_URL",
  workout4: "VIDEO_URL",
  stretch: "VIDEO_URL"
};

// TIMELINE
const timeline = [];

timeline.push({ type: "video", label: "WARMUP", duration: 360, video: "warmup" });

function addWorkoutBlock(name) {
  for (let i = 1; i <= 3; i++) {
    timeline.push({ type: "video", label: `WORK ${name}-${i}`, duration: 45, video: `workout${name}` });
    timeline.push({ type: "rest", label: "REST", duration: 15 });
  }
  timeline.push({ type: "break", label: "BREAK", duration: 60, next: `workout${parseInt(name) + 1}` });
}

addWorkoutBlock("1");
addWorkoutBlock("2");
addWorkoutBlock("3");
addWorkoutBlock("4");

timeline.push({ type: "video", label: "STRETCH", duration: 360, video: "stretch" });

// STATE
let index = 0;
let startTime = Date.now();
let paused = false;
let pausedTime = 0;
let videoStopped = false;

// VIDEO LOADER
function loadVideo(key) {
  const url = videos[key];
  video.src = url + "&t=" + Date.now();
  video.load();
  video.play().catch(() => {
    document.body.addEventListener("click", () => video.play());
  });
}

// MAIN LOOP
setInterval(() => {
  if (paused) return;

  const segment = timeline[index];
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const remain = segment.duration - elapsed;

  label.innerText = segment.label;
  updateTimer(remain);

  if (!videoStopped) {
    if (segment.type === "video") {
      centerText.style.display = "none";
      video.style.display = "block";

      if (!video.src.includes(videos[segment.video])) {
        loadVideo(segment.video);
      }
    }

    if (segment.type === "rest") {
      video.pause();
      video.style.display = "none";
      centerText.innerText = "REST";
      centerText.style.display = "block";
    }

    if (segment.type === "break") {
      video.pause();
      video.style.display = "none";
      centerText.style.display = "block";

      if (remain <= 15 && segment.next && videos[segment.next]) {
        centerText.innerText = "NEXT";
        video.style.display = "block";
        loadVideo(segment.next);
      } else {
        centerText.innerText = "BREAK";
      }
    }
  }

  if (remain <= 0) {
    nextSegment();
  }

}, 250);

// CONTROLS

function play() {
  if (paused) {
    startTime += (Date.now() - pausedTime);
    paused = false;
  }
  video.play();
}

function pause() {
  paused = true;
  pausedTime = Date.now();
  video.pause();
}

function stop() {
  videoStopped = true;
  video.pause();
}

function reset() {
  index = 0;
  startTime = Date.now();
  paused = false;
  videoStopped = false;
  loadVideo("warmup");
}

function nextSegment() {
  index++;
  if (index >= timeline.length) index = 0;
  startTime = Date.now();
  videoStopped = false;
}

function prevSegment() {
  index--;
  if (index < 0) index = timeline.length - 1;
  startTime = Date.now();
  videoStopped = false;
}

// TIMER
function updateTimer(seconds) {
  const s = Math.max(0, seconds);
  const m = Math.floor(s / 60);
  const sec = s % 60;

  timer.innerText =
    `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
}
</script>

</body>
</html>
