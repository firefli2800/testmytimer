<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Display</title>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  color:#fff;
  font-family:Arial,sans-serif;
  overflow:hidden;
}

/*
  The TV/computer can stay in normal landscape mode.
  The website rotates itself into portrait mode.

  You confirmed -90deg is correct.
*/
#rotateStage{
  position:fixed;
  top:50%;
  left:50%;
  width:100vh;
  height:100vw;
  transform:translate(-50%,-50%) rotate(-90deg);
  transform-origin:center center;
  background:
    linear-gradient(rgba(0,0,0,.25), rgba(0,0,0,.25)),
    url("./ChatGPT Image May 1, 2026, 02_05_25 AM.png") center center / cover no-repeat;
  overflow:hidden;
}

#appShell{
  position:absolute;
  inset:0;
  z-index:1;
  display:grid;
  grid-template-rows:110px 1fr 160px 1fr;
  background:transparent;
}

#topBar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 30px;
  background:rgba(0,0,0,.68);
  border-bottom:3px solid rgba(255,255,255,.18);
  z-index:20;
  backdrop-filter:blur(2px);
}

#stationBadge{
  font-size:34px;
  font-weight:bold;
  letter-spacing:.5px;
}

#roundBadge{
  font-size:28px;
  font-weight:bold;
  text-align:right;
  line-height:1.1;
  white-space:pre-line;
}

.videoWrap{
  position:relative;
  width:100%;
  height:100%;
  background:transparent;
  overflow:hidden;
}

video{
  width:100%;
  height:100%;
  object-fit:contain;
  background:transparent;
}

.videoName{
  position:absolute;
  left:50%;
  bottom:18px;
  transform:translateX(-50%);
  z-index:10;
  padding:12px 22px;
  background:rgba(0,0,0,.68);
  border:1px solid rgba(255,255,255,.22);
  border-radius:10px;
  font-size:30px;
  font-weight:bold;
  letter-spacing:.3px;
  text-align:center;
  width:auto;
  max-width:92%;
  white-space:normal;
  overflow:visible;
  text-overflow:clip;
  line-height:1.08;
  text-shadow:0 0 14px rgba(0,0,0,.8);
}

#timerBar{
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.18);
  border-top:3px solid rgba(255,255,255,.18);
  border-bottom:3px solid rgba(255,255,255,.18);
  z-index:25;
  backdrop-filter:none;
}

#timer{
  font-size:104px;
  line-height:1;
  font-weight:bold;
  letter-spacing:2px;
  text-shadow:0 0 24px rgba(0,0,0,.85);
}

#appShell.single{
  grid-template-rows:110px 1fr 160px;
}

#appShell.single #videoWrap1{
  display:block;
}

#appShell.single #videoWrap2{
  display:none;
}

#appShell.dual #videoWrap1,
#appShell.dual #videoWrap2{
  display:block;
}

#appShell.none #videoWrap1,
#appShell.none #videoWrap2{
  display:none;
}

/*
  Center overlay for REST / BREAK / LOADING / MISSING VIDEO.
  This sits over the branded background.
*/
#center{
  position:absolute;
  inset:0;
  z-index:30;
  font-size:84px;
  line-height:1.1;
  text-align:center;
  white-space:pre-line;
  text-shadow:0 0 28px rgba(0,0,0,.95);
  display:none;
  font-weight:bold;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  color:#fff;
  padding:40px;
}

/*
  Small label used specifically for next-up previews.
  This prevents NEXT UP from overlapping the timer/top labels.
*/
#upcomingLabel{
  position:absolute;
  left:50%;
  top:132px;
  transform:translateX(-50%);
  z-index:35;
  display:none;
  padding:10px 20px;
  background:rgba(0,0,0,.7);
  border:1px solid rgba(255,255,255,.22);
  border-radius:10px;
  font-size:34px;
  font-weight:bold;
  letter-spacing:1px;
  text-align:center;
  text-shadow:0 0 18px rgba(0,0,0,.9);
  pointer-events:none;
}
</style>
</head>
<body>

<div id="rotateStage">
  <div id="appShell" class="none">
    <div id="topBar">
      <div id="stationBadge"></div>
      <div id="roundBadge"></div>
    </div>

    <div id="videoWrap1" class="videoWrap">
      <video id="video1" muted playsinline preload="auto" loop></video>
      <div id="videoName1" class="videoName"></div>
    </div>

    <div id="timerBar">
      <div id="timer"></div>
    </div>

    <div id="videoWrap2" class="videoWrap">
      <video id="video2" muted playsinline preload="auto" loop></video>
      <div id="videoName2" class="videoName"></div>
    </div>
  </div>

  <div id="center"></div>
  <div id="upcomingLabel">NEXT UP</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-functions.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAR7B5phYOnasZkBQyqut56i_DKA8HFJz0",
  authDomain: "timer-app-30e7d.firebaseapp.com",
  databaseURL: "https://timer-app-30e7d-default-rtdb.firebaseio.com",
  projectId: "timer-app-30e7d",
  storageBucket: "timer-app-30e7d.firebasestorage.app"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const storage = firebase.storage();
const functions = firebase.app().functions("us-central1");
const resolveYMoveVideo = functions.httpsCallable("resolveYMoveVideo");

const params = new URLSearchParams(window.location.search);
const requestedScreen = parseInt(params.get("screen"), 10);
const screenNumber = requestedScreen >= 1 && requestedScreen <= 3 ? requestedScreen : 1;
const screenIndex = screenNumber - 1;

const appShell = document.getElementById("appShell");

const video1 = document.getElementById("video1");
const video2 = document.getElementById("video2");
const videos = [video1, video2];

const videoName1 = document.getElementById("videoName1");
const videoName2 = document.getElementById("videoName2");
const videoNames = [videoName1, videoName2];

const stationBadge = document.getElementById("stationBadge");
const roundBadge = document.getElementById("roundBadge");
const timer = document.getElementById("timer");
const center = document.getElementById("center");
const upcomingLabel = document.getElementById("upcomingLabel");

let state = { startTime: Date.now(), paused: true, elapsed: 0 };
let workoutConfig = null;

let activeSources = ["", ""];
let activeContextKeys = ["", ""];
let pendingLoadIds = [0, 0];

const firebaseUrlCache = {};
const ymoveUrlCache = {};
let renderToken = 0;

function numberOrDefault(value, fallback) {
  const number = Number(value);
  return Number.isFinite(number) ? number : fallback;
}

function emptyAction() {
  return {
    source: "firebase",
    path: "",
    name: ""
  };
}

function defaultWorkoutConfig() {
  return {
    includeWarmup: true,
    includeCooldown: true,
    loopBlocks: false,
    warmupSeconds: 180,
    cooldownSeconds: 180,
    warmupPath: "",
    cooldownPath: "",
    blocks: Array.from({ length: 6 }, () => ({
      workSeconds: 45,
      restSeconds: 15,
      rounds: 3,
      breakSeconds: 0,
      stations: [
        [emptyAction(), emptyAction()],
        [emptyAction(), emptyAction()],
        [emptyAction(), emptyAction()]
      ]
    }))
  };
}

function cleanName(value) {
  if (!value) return "";
  const fileName = String(value).split("/").pop() || value;
  return decodeURIComponent(fileName).replace(/\.[^/.]+$/, "");
}

function normalizeAction(value) {
  if (!value) return emptyAction();

  if (typeof value === "string") {
    return {
      source: "firebase",
      path: value,
      name: cleanName(value)
    };
  }

  if (value.source === "ymove") {
    return {
      source: "ymove",
      exerciseId: value.exerciseId || "",
      name: value.name || "YMove Exercise",
      meta: value.meta || {}
    };
  }

  return {
    source: "firebase",
    path: value.path || "",
    name: value.name || cleanName(value.path || "")
  };
}

function normalizeConfig(config) {
  const base = defaultWorkoutConfig();
  const incoming = config || {};

  const normalized = {
    ...base,
    ...incoming,
    includeWarmup: incoming.includeWarmup !== undefined ? incoming.includeWarmup : base.includeWarmup,
    includeCooldown: incoming.includeCooldown !== undefined ? incoming.includeCooldown : base.includeCooldown,
    loopBlocks: incoming.loopBlocks !== undefined ? incoming.loopBlocks : base.loopBlocks,
    blocks: []
  };

  for (let i = 0; i < 6; i += 1) {
    const oldBlock = incoming.blocks?.[i];

    if (Array.isArray(oldBlock)) {
      normalized.blocks.push({
        ...base.blocks[i],
        stations: [
          [normalizeAction(oldBlock[0]), emptyAction()],
          [normalizeAction(oldBlock[1]), emptyAction()],
          [normalizeAction(oldBlock[2]), emptyAction()]
        ]
      });
    } else {
      const block = {
        ...base.blocks[i],
        ...(oldBlock || {}),
        stations: []
      };

      for (let station = 0; station < 3; station += 1) {
        const stationValue = oldBlock?.stations?.[station];

        if (Array.isArray(stationValue)) {
          block.stations.push([
            normalizeAction(stationValue[0]),
            normalizeAction(stationValue[1])
          ]);
        } else {
          block.stations.push([emptyAction(), emptyAction()]);
        }
      }

      normalized.blocks.push(block);
    }
  }

  return normalized;
}

function buildTimeline() {
  const config = workoutConfig || defaultWorkoutConfig();
  const segments = [];

  if (!config.loopBlocks && config.includeWarmup !== false) {
    segments.push({
      kind: "singleVideo",
      duration: numberOrDefault(config.warmupSeconds, 180),
      label: "WARMUP",
      item: normalizeAction(config.warmupPath || "")
    });
  }

  config.blocks.forEach((block, blockIndex) => {
    const rounds = numberOrDefault(block.rounds, 3);
    const workSeconds = numberOrDefault(block.workSeconds, 45);
    const restSeconds = numberOrDefault(block.restSeconds, 15);
    const breakSeconds = numberOrDefault(block.breakSeconds, 0);

    for (let roundIndex = 1; roundIndex <= rounds; roundIndex += 1) {
      segments.push({
        kind: "dualVideo",
        duration: workSeconds,
        blockIndex,
        roundIndex,
        rounds,
        label: `ROUND ${roundIndex} OF ${rounds}`
      });

      if (restSeconds > 0) {
        segments.push({
          kind: "rest",
          duration: restSeconds,
          blockIndex,
          roundIndex,
          rounds,
          label: "REST"
        });
      }
    }

    if (breakSeconds > 0) {
      segments.push({
        kind: "break",
        duration: breakSeconds,
        blockIndex,
        label: "BREAK"
      });
    }
  });

  if (!config.loopBlocks && config.includeCooldown !== false) {
    segments.push({
      kind: "singleVideo",
      duration: numberOrDefault(config.cooldownSeconds, 180),
      label: "STRETCH",
      item: normalizeAction(config.cooldownPath || "")
    });
  }

  return segments;
}

function getTimeline() {
  return buildTimeline();
}

function getTotalDurationMs() {
  return getTimeline().reduce((sum, segment) => sum + (segment.duration * 1000), 0);
}

function getElapsedMs() {
  const totalDurationMs = getTotalDurationMs();

  let raw = state.paused
    ? (state.elapsed || 0)
    : (Date.now() - (state.startTime || Date.now()));

  raw = Math.max(0, raw);

  if (workoutConfig?.loopBlocks && totalDurationMs > 0) {
    return raw % totalDurationMs;
  }

  return Math.max(0, Math.min(raw, totalDurationMs));
}

function locateSegment(elapsedMs) {
  const timeline = getTimeline();
  const totalDurationMs = getTotalDurationMs();

  if (!timeline.length) {
    return {
      index: 0,
      segment: { kind: "none", duration: 0, label: "" },
      segmentElapsedMs: 0,
      finished: true
    };
  }

  if (elapsedMs >= totalDurationMs) {
    const lastIndex = timeline.length - 1;
    return {
      index: lastIndex,
      segment: timeline[lastIndex],
      segmentElapsedMs: timeline[lastIndex].duration * 1000,
      finished: true
    };
  }

  let cursor = 0;

  for (let i = 0; i < timeline.length; i += 1) {
    const size = timeline[i].duration * 1000;

    if (elapsedMs < cursor + size) {
      return {
        index: i,
        segment: timeline[i],
        segmentElapsedMs: elapsedMs - cursor,
        finished: false
      };
    }

    cursor += size;
  }

  return {
    index: timeline.length - 1,
    segment: timeline[timeline.length - 1],
    segmentElapsedMs: 0,
    finished: false
  };
}

function getSingleVideoItem(segment) {
  return segment.item || emptyAction();
}

function getDualVideoItems(segment) {
  if (!workoutConfig) return [emptyAction(), emptyAction()];

  const block = workoutConfig.blocks?.[segment.blockIndex];
  const station = block?.stations?.[screenIndex];

  if (!station) return [emptyAction(), emptyAction()];

  return [
    normalizeAction(station[0]),
    normalizeAction(station[1])
  ];
}

function getBlockBreakSeconds(blockIndex) {
  const block = workoutConfig?.blocks?.[blockIndex];
  return numberOrDefault(block?.breakSeconds, 0);
}

async function getFirebaseUrl(path) {
  if (!path) return null;
  if (firebaseUrlCache[path]) return firebaseUrlCache[path];

  const url = await storage.ref(path).getDownloadURL();
  firebaseUrlCache[path] = url;
  return url;
}

async function getYMoveUrl(exerciseId) {
  if (!exerciseId) return null;

  const cached = ymoveUrlCache[exerciseId];
  if (cached && cached.videoUrl && Number(cached.expiresAt || 0) > Date.now() + 600000) {
    return cached.videoUrl;
  }

  const response = await resolveYMoveVideo({
    exerciseId,
    forceRefresh: false
  });

  const data = response.data || {};
  ymoveUrlCache[exerciseId] = {
    videoUrl: data.videoUrl,
    expiresAt: data.expiresAt || 0
  };

  return data.videoUrl || null;
}

async function resolveVideoItem(item) {
  const normalized = normalizeAction(item);

  if (normalized.source === "ymove") {
    const url = await getYMoveUrl(normalized.exerciseId);
    return {
      url,
      name: normalized.name || "YMove Exercise",
      key: `ymove:${normalized.exerciseId}`
    };
  }

  const url = await getFirebaseUrl(normalized.path);
  return {
    url,
    name: normalized.name || cleanName(normalized.path),
    key: `firebase:${normalized.path}`
  };
}

function getNextVideoInfo(fromIndex) {
  const timeline = getTimeline();

  for (let i = fromIndex + 1; i < timeline.length; i += 1) {
    if (timeline[i].kind === "dualVideo" || timeline[i].kind === "singleVideo") {
      return { index: i, segment: timeline[i] };
    }
  }

  if (workoutConfig?.loopBlocks) {
    for (let i = 0; i < timeline.length; i += 1) {
      if (timeline[i].kind === "dualVideo" || timeline[i].kind === "singleVideo") {
        return { index: i, segment: timeline[i] };
      }
    }
  }

  return null;
}

function getDisplayLabel(segment, requestLabel, isUpcoming) {
  if (!segment) return "";

  if (isUpcoming) {
    return "NEXT";
  }

  if (requestLabel === "BREAK" || requestLabel === "REST") {
    return requestLabel;
  }

  if (segment.kind === "dualVideo") {
    const blockText = `BLOCK ${segment.blockIndex + 1}`;
    const roundText = `ROUND ${segment.roundIndex}/${segment.rounds}`;

    return workoutConfig?.loopBlocks
      ? `${blockText}\n${roundText}\nLOOP`
      : `${blockText}\n${roundText}`;
  }

  return workoutConfig?.loopBlocks ? `${requestLabel}\nLOOP` : requestLabel;
}

async function buildNextUpRequest(index, segment, remain, finished) {
  const nextVideoInfo = getNextVideoInfo(index);

  if (!nextVideoInfo) return null;

  const nextSegment = nextVideoInfo.segment;

  if (nextSegment.kind === "dualVideo") {
    const items = getDualVideoItems(nextSegment);
    const resolved = await Promise.all(items.map(item => resolveVideoItem(item)));

    if (resolved[0]?.url || resolved[1]?.url) {
      return {
        mode: "dual",
        sourceUrls: [resolved[0]?.url, resolved[1]?.url],
        names: [resolved[0]?.name, resolved[1]?.name],
        contextKey: `preview:${index}:${resolved.map(r => r?.key).join("|")}`,
        seekSeconds: 0,
        shouldPlay: !state.paused && (!finished || workoutConfig?.loopBlocks),
        centerText: "",
        upcoming: true,
        labelText: "NEXT",
        segment,
        remain
      };
    }
  }

  if (nextSegment.kind === "singleVideo") {
    const item = getSingleVideoItem(nextSegment);
    const resolved = await resolveVideoItem(item);

    if (resolved.url) {
      return {
        mode: "single",
        sourceUrls: [resolved.url, null],
        names: [resolved.name, ""],
        contextKey: `preview:${index}:${resolved.key}`,
        seekSeconds: 0,
        shouldPlay: !state.paused && (!finished || workoutConfig?.loopBlocks),
        centerText: "",
        upcoming: true,
        labelText: "NEXT",
        segment,
        remain
      };
    }
  }

  return null;
}

async function buildMediaRequest(info) {
  const { index, segment, segmentElapsedMs, finished } = info;
  const remain = Math.max(0, segment.duration - Math.floor(segmentElapsedMs / 1000));

if (segment.kind === "rest") {
  const breakSeconds = getBlockBreakSeconds(segment.blockIndex);

  /*
    If this block has no dedicated break screen, REST stays as REST first,
    then becomes NEXT UP only during the final 10 seconds.
  */
  if (breakSeconds <= 0 && remain <= 10) {
    const nextUp = await buildNextUpRequest(index, segment, remain, finished);
    if (nextUp) return nextUp;
  }

  return {
    mode: "none",
    centerText: "REST",
    upcoming: false,
    labelText: "REST",
    segment,
    remain
  };
}

    return {
      mode: "none",
      centerText: "REST",
      upcoming: false,
      labelText: "REST",
      segment,
      remain
    };
  }

  if (segment.kind === "break") {
    if (remain <= 15) {
      const nextUp = await buildNextUpRequest(index, segment, remain, finished);
      if (nextUp) return nextUp;
    }

    return {
      mode: "none",
      centerText: "BREAK",
      upcoming: false,
      labelText: "BREAK",
      segment,
      remain
    };
  }

  if (segment.kind === "singleVideo") {
    const item = getSingleVideoItem(segment);
    const resolved = await resolveVideoItem(item);

    return {
      mode: resolved.url ? "single" : "none",
      sourceUrls: [resolved.url, null],
      names: [resolved.name, ""],
      contextKey: `segment:${index}:${resolved.key}`,
      seekSeconds: segmentElapsedMs / 1000,
      shouldPlay: !state.paused && (!finished || workoutConfig?.loopBlocks),
      centerText: resolved.url ? "" : "MISSING\nVIDEO",
      upcoming: false,
      labelText: segment.label,
      segment,
      remain
    };
  }

  if (segment.kind === "dualVideo") {
    const items = getDualVideoItems(segment);
    const resolved = await Promise.all(items.map(item => resolveVideoItem(item)));

    return {
      mode: (resolved[0]?.url || resolved[1]?.url) ? "dual" : "none",
      sourceUrls: [resolved[0]?.url, resolved[1]?.url],
      names: [resolved[0]?.name, resolved[1]?.name],
      contextKey: `segment:${index}:${resolved.map(r => r?.key).join("|")}`,
      seekSeconds: segmentElapsedMs / 1000,
      shouldPlay: !state.paused && (!finished || workoutConfig?.loopBlocks),
      centerText: (resolved[0]?.url || resolved[1]?.url) ? "" : "MISSING\nVIDEOS",
      upcoming: false,
      labelText: segment.label,
      segment,
      remain
    };
  }

  return {
    mode: "none",
    centerText: "",
    upcoming: false,
    labelText: "",
    segment,
    remain
  };
}

function clampSeek(video, seconds) {
  if (Number.isFinite(video.duration) && video.duration > 0) {
    return Math.max(0, Math.min(seconds, Math.max(0, video.duration - 0.1)));
  }

  return Math.max(0, seconds);
}

function seekVideo(video, seconds) {
  if (!Number.isFinite(seconds)) return;

  try {
    video.currentTime = clampSeek(video, seconds);
  } catch (error) {}
}

function safePlay(video) {
  if (!video) return;
  video.play().catch(() => {});
}

function stopUnusedVideos(activeCount) {
  videos.forEach((video, i) => {
    if (i >= activeCount) {
      video.pause();
      video.removeAttribute("src");
      video.load();
      activeSources[i] = "";
      activeContextKeys[i] = "";
      videoNames[i].innerText = "";
    }
  });
}

function loadSource(slotIndex, request, sourceUrl) {
  const video = videos[slotIndex];

  pendingLoadIds[slotIndex] += 1;
  const loadId = pendingLoadIds[slotIndex];

  const ready = () => {
    video.removeEventListener("loadedmetadata", ready);
    video.removeEventListener("canplay", ready);

    if (loadId !== pendingLoadIds[slotIndex]) return;

    seekVideo(video, request.seekSeconds);

    if (request.shouldPlay) safePlay(video);
    else video.pause();
  };

  video.pause();
  video.addEventListener("loadedmetadata", ready);
  video.addEventListener("canplay", ready);
  video.src = sourceUrl;
  video.load();
}

function syncVideoSlot(slotIndex, request, sourceUrl) {
  const video = videos[slotIndex];

  if (!sourceUrl) {
    video.pause();
    video.removeAttribute("src");
    video.load();
    activeSources[slotIndex] = "";
    activeContextKeys[slotIndex] = "";
    return;
  }

  const slotContextKey = `${request.contextKey}:slot${slotIndex}`;
  const sourceChanged = sourceUrl !== activeSources[slotIndex];
  const contextChanged = slotContextKey !== activeContextKeys[slotIndex];

  activeContextKeys[slotIndex] = slotContextKey;
  video.loop = true;

  if (sourceChanged) {
    activeSources[slotIndex] = sourceUrl;
    loadSource(slotIndex, request, sourceUrl);
    return;
  }

  if (contextChanged) {
    seekVideo(video, request.seekSeconds);
  }

  if (request.shouldPlay) {
    if (video.paused) safePlay(video);
  } else {
    video.pause();
  }
}

function syncVideos(request) {
  const activeCount = request.mode === "dual" ? 2 : 1;

  stopUnusedVideos(activeCount);

  for (let i = 0; i < activeCount; i += 1) {
    syncVideoSlot(i, request, request.sourceUrls?.[i]);
  }
}

function setVideoLayout(request) {
  appShell.className = "";

  if (request.mode === "none") {
    appShell.classList.add("none");
    videos.forEach(video => video.pause());
    videoNames.forEach(name => name.innerText = "");
    return;
  }

  appShell.classList.add(request.mode);

  videoName1.innerText = request.names?.[0] || "";
  videoName2.innerText = request.mode === "dual" ? (request.names?.[1] || "") : "";
}

async function render() {
  const myToken = ++renderToken;

  if (!workoutConfig) {
    stationBadge.innerText = `STATION ${screenNumber}`;
    roundBadge.innerText = "";
    timer.innerText = "--:--";
    center.innerText = "LOADING\nWORKOUT";
    center.style.display = "flex";
    upcomingLabel.style.display = "none";
    appShell.className = "none";
    videos.forEach(video => video.pause());
    return;
  }

  const info = locateSegment(getElapsedMs());
  const request = await buildMediaRequest(info);

  if (myToken !== renderToken) return;

  stationBadge.innerText = `STATION ${screenNumber}`;
  roundBadge.innerText = getDisplayLabel(request.segment, request.labelText, request.upcoming);
  timer.innerText = format(request.remain);

  center.innerText = request.centerText || "";
  center.style.display = request.centerText ? "flex" : "none";

  upcomingLabel.style.display = request.upcoming ? "block" : "none";

  setVideoLayout(request);

  if (request.mode !== "none") {
    syncVideos(request);
  }
}

function format(totalSeconds) {
  const safe = Math.max(0, totalSeconds);
  const minutes = Math.floor(safe / 60);
  const seconds = safe % 60;
  return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
}

db.ref("state").on("value", (snap) => {
  state = { startTime: Date.now(), paused: true, elapsed: 0, ...(snap.val() || {}) };
  render();
});

db.ref("workoutConfig").on("value", (snap) => {
  workoutConfig = normalizeConfig(snap.val());
  activeSources = ["", ""];
  activeContextKeys = ["", ""];
  render();
});

render();
setInterval(render, 250);
</script>

</body>
