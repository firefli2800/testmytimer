<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Video Test</title>

<style>
  html, body {
    margin: 0;
    height: 100%;
    background: black;
  }

  video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
  }

  #timer {
    position: fixed;
    top: 20px;
    right: 30px;
    color: white;
    font-size: 80px;
    font-family: Arial, sans-serif;
    text-shadow: 0 0 10px black;
    z-index: 10;
  }
</style>
</head>

<body>

<video id="video" muted autoplay playsinline loop>
  <source src="https://firebasestorage.googleapis.com/v0/b/timer-app-30e7d.firebasestorage.app/o/Back%20Opener.mp4?alt=media&token=b1db24b5-370e-4f86-ac23-e6c5f269fb8e">
</video>

<div id="timer">00:45</div>

<script>
  const video = document.getElementById("video");
  const timer = document.getElementById("timer");

  const duration = 45; // seconds
  let startTime = null;

  // Ensure video plays
  video.play().catch(() => {
    console.log("Autoplay blocked — click screen");
  });

  document.body.addEventListener("click", () => {
    video.play();
  });

  // Start timer when video actually starts playing
  video.addEventListener("playing", () => {
    if (!startTime) {
      startTime = Date.now();
    }
  });

  // Update timer independently (so looping doesn't break it)
  setInterval(() => {
    if (!startTime) return;

    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const remain = Math.max(0, duration - elapsed);

    const minutes = Math.floor(remain / 60);
    const seconds = remain % 60;

    timer.innerText =
      `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
  }, 250);

</script>

</body>
</html>
