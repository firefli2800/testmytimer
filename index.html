<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Gym Display + Controller</title>

<style>
  html, body { margin: 0; height: 100%; background: black; color: white; font-family: Arial; }
  video { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; }
  #overlay { position: fixed; top: 20px; right: 30px; z-index: 10; }
  #label { font-size: 40px; }
  #timer { font-size: 80px; }

  #centerText {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 100px;
    display: none;
    z-index: 20;
  }

  #controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 30;
  }

  button { margin: 5px; padding: 10px; }
</style>
</head>

<body>

<video id="video" muted playsinline loop></video>

<div id="overlay">
  <div id="label"></div>
  <div id="timer"></div>
</div>

<div id="centerText"></div>

<div id="controls">
  <button onclick="play()">Play</button>
  <button onclick="pause()">Pause</button>
  <button onclick="stop()">Stop Video</button>
  <button onclick="reset()">Reset</button>
  <button onclick="nextSegment()">Next</button>
  <button onclick="prevSegment()">Prev</button>
</div>

<script>
const video = document.getElementById("video");
const label = document.getElementById("label");
const timer = document.getElementById("timer");
const centerText = document.getElementById("centerText");

const videos = {
  warmup: "VIDEO_URL",
  workout1: "https://firebasestorage.googleapis.com/v0/b/timer-app-30e7d.firebasestorage.app/o/Back%20Opener.mp4?alt=media&token=b1db24b5-370e-4f86-ac23-e6c5f269fb8e",
  workout2: "https://firebasestorage.googleapis.com/v0/b/timer-app-30e7d.firebasestorage.app/o/Cat%20Cow.mp4?alt=media&token=e81ab0f9-67dc-4145-8494-614a47b121e9",
  workout3: "https://firebasestorage.googleapis.com/v0/b/timer-app-30e7d.firebasestorage.app/o/Dynamic%2090-90%20Hip%20Twist.mp4?alt=media&token=cb9f2e38-4de6-48ca-a29b-cd94a7531aed",
  workout4: "https://firebasestorage.googleapis.com/v0/b/timer-app-30e7d.firebasestorage.app/o/Squat%20Side%20Bends(1).mp4?alt=media&token=368da077-c114-4024-8109-2716cb2b32ab",
  stretch: "VIDEO_URL"
};

const timeline = [];
timeline.push({ type: "video", label: "WARMUP", duration: 360, video: "warmup" });

function addBlock(n) {
  for (let i=1;i<=3;i++){
    timeline.push({ type:"video", label:`WORK ${n}-${i}`, duration:45, video:`workout${n}` });
    timeline.push({ type:"rest", label:"REST", duration:15 });
  }
  timeline.push({ type:"break", label:"BREAK", duration:60, next:`workout${n+1}` });
}

addBlock(1); addBlock(2); addBlock(3); addBlock(4);
timeline.push({ type:"video", label:"STRETCH", duration:360, video:"stretch" });

let index = 0;
let startTime = Date.now();
let paused = false;
let pausedTime = 0;
let videoStopped = false;

function loadVideo(key){
  const url = videos[key];
  video.src = url + "&t=" + Date.now();
  video.load();
  video.play().catch(()=>{});
}

function applySegment(){
  const segment = timeline[index];

  label.innerText = segment.label;
  centerText.style.display = "none";
  videoStopped = false;

  if(segment.type === "video"){
    video.style.display = "block";
    loadVideo(segment.video);
  }

  if(segment.type === "rest"){
    video.pause();
    video.style.display = "none";
    centerText.innerText = "REST";
    centerText.style.display = "block";
  }

  if(segment.type === "break"){
    video.pause();
    video.style.display = "none";
    centerText.innerText = "BREAK";
    centerText.style.display = "block";
  }
}

setInterval(()=>{
  if(paused) return;

  const segment = timeline[index];
  const elapsed = Math.floor((Date.now()-startTime)/1000);
  const remain = segment.duration - elapsed;

  updateTimer(remain);

  if(segment.type === "break" && remain <= 15){
    centerText.innerText = "NEXT";
    video.style.display = "block";
    loadVideo(segment.next);
  }

  if(remain <= 0){
    nextSegment();
  }

},250);

// 🔥 CONTROLS (FIXED)

function play(){
  if(paused){
    startTime += (Date.now() - pausedTime);
    paused = false;
  }
  video.play();
}

function pause(){
  paused = true;
  pausedTime = Date.now();
  video.pause();
}

function stop(){
  videoStopped = true;
  video.pause(); // 🔥 THIS NOW WORKS
}

function reset(){
  index = 0;
  startTime = Date.now();
  paused = false;
  applySegment(); // 🔥 FORCE UPDATE
}

function nextSegment(){
  index++;
  if(index >= timeline.length) index = 0;
  startTime = Date.now();
  applySegment(); // 🔥 FORCE UPDATE
}

function prevSegment(){
  index--;
  if(index < 0) index = timeline.length - 1;
  startTime = Date.now();
  applySegment(); // 🔥 FORCE UPDATE
}

function updateTimer(s){
  s = Math.max(0,s);
  const m = Math.floor(s/60);
  const sec = s%60;
  timer.innerText = `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

// 🔥 INITIAL LOAD
applySegment();
</script>

</body>
</html>
