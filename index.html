<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Video Test</title>

<style>
  html, body {
    margin: 0;
    height: 100%;
    background: black;
  }

  video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
  }
</style>
</head>

<body>

<video id="video" muted autoplay playsinline>
  <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
</video>

<script>
  const video = document.getElementById("video");

  // Force play in case browser blocks autoplay
  video.play().catch(() => {
    console.log("Autoplay blocked — click screen");
  });

  // Click anywhere to start if blocked
  document.body.addEventListener("click", () => {
    video.play();
  });
</script>

</body>
</html>
