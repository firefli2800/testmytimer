<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Gym Display</title>

<style>
  html, body {
    margin: 0;
    height: 100%;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
  }

  video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
  }

  #overlay {
    position: fixed;
    top: 20px;
    right: 30px;
    text-align: right;
    z-index: 10;
  }

  #label {
    font-size: 40px;
    font-weight: bold;
    text-shadow: 0 0 10px black;
  }

  #timer {
    font-size: 80px;
    text-shadow: 0 0 10px black;
  }

  /* 🔥 BIG REST SCREEN */
  #restScreen {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 120px;
    font-weight: bold;
    display: none;
    z-index: 20;
  }
</style>
</head>

<body>

<video id="video" muted playsinline loop></video>

<div id="overlay">
  <div id="label">WORK</div>
  <div id="timer">00:45</div>
</div>

<div id="restScreen">REST</div>

<script>
const video = document.getElementById("video");
const timer = document.getElementById("timer");
const label = document.getElementById("label");
const restScreen = document.getElementById("restScreen");

// 🔧 CONFIG
const WORK_DURATION = 45;
const REST_DURATION = 15;

// 🔧 CHANGE THESE VIDEOS LATER
const exercises = [
  "https://firebasestorage.googleapis.com/v0/b/timer-app-30e7d.firebasestorage.app/o/Back%20Opener.mp4?alt=media&token=b1db24b5-370e-4f86-ac23-e6c5f269fb8e",
  "https://firebasestorage.googleapis.com/v0/b/timer-app-30e7d.firebasestorage.app/o/Back%20Opener.mp4?alt=media&token=b1db24b5-370e-4f86-ac23-e6c5f269fb8e",
  "https://firebasestorage.googleapis.com/v0/b/timer-app-30e7d.firebasestorage.app/o/Back%20Opener.mp4?alt=media&token=b1db24b5-370e-4f86-ac23-e6c5f269fb8e"
];

// STATE
let phase = "work"; // "work" or "rest"
let phaseStart = Date.now();

let exerciseIndex = 0; // 0–2
let round = 1;         // 1–3

// Load first video
loadVideo(exercises[exerciseIndex]);

function loadVideo(url) {
  video.src = url + "&t=" + Date.now(); // cache bust
  video.load();
  video.play().catch(() => {
    document.body.addEventListener("click", () => video.play());
  });
}

// MAIN LOOP
setInterval(() => {

  const elapsed = Math.floor((Date.now() - phaseStart) / 1000);

  if (phase === "work") {
    const remain = WORK_DURATION - elapsed;

    // UI
    label.innerText = `WORK ${exerciseIndex + 1}-${round}`;
    updateTimer(remain);

    video.style.display = "block";
    restScreen.style.display = "none";

    if (remain <= 0) {
      phase = "rest";
      phaseStart = Date.now();

      video.pause();
      video.style.display = "none";
      restScreen.style.display = "block";
    }
  }

  else if (phase === "rest") {
    const remain = REST_DURATION - elapsed;

    label.innerText = "REST";
    updateTimer(remain);

    if (remain <= 0) {

      // advance round
      round++;

      if (round > 3) {
        round = 1;
        exerciseIndex++;

        if (exerciseIndex >= exercises.length) {
          exerciseIndex = 0; // loop entire workout
        }

        loadVideo(exercises[exerciseIndex]);
      }

      phase = "work";
      phaseStart = Date.now();

      video.currentTime = 0;
      video.style.display = "block";
      restScreen.style.display = "none";
      video.play();
    }
  }

}, 250);

// TIMER FORMAT
function updateTimer(seconds) {
  const s = Math.max(0, seconds);
  const m = Math.floor(s / 60);
  const sec = s % 60;

  timer.innerText =
    `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
}
</script>

</body>
</html>
