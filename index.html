<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Display</title>
<style>
html,body{
  margin:0;
  height:100%;
  background:#000;
  color:#fff;
  font-family:Arial,sans-serif;
  overflow:hidden;
}
video{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  object-fit:contain;
  background:#000;
}
#overlay{
  position:fixed;
  top:20px;
  right:30px;
  z-index:20;
  text-align:right;
}
#label{font-size:34px}
#timer{font-size:76px;line-height:1}
#center{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:30;
  font-size:76px;
  line-height:1.1;
  text-align:center;
  white-space:pre-line;
  text-shadow:0 0 24px rgba(0,0,0,.65);
  display:none;
}
</style>
</head>
<body>

<video id="video" muted playsinline preload="auto" loop></video>

<div id="overlay">
  <div id="label"></div>
  <div id="timer"></div>
</div>

<div id="center"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAR7B5phYOnasZkBQyqut56i_DKA8HFJz0",
  authDomain: "timer-app-30e7d.firebaseapp.com",
  databaseURL: "https://timer-app-30e7d-default-rtdb.firebaseio.com",
  projectId: "timer-app-30e7d",
  storageBucket: "timer-app-30e7d.firebasestorage.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const storage = firebase.storage();

const params = new URLSearchParams(window.location.search);
const requestedScreen = parseInt(params.get("screen"), 10);
const screenNumber = requestedScreen >= 1 && requestedScreen <= 3 ? requestedScreen : 1;
const screenIndex = screenNumber - 1;

const video = document.getElementById("video");
const label = document.getElementById("label");
const timer = document.getElementById("timer");
const center = document.getElementById("center");

let state = { startTime: Date.now(), paused: true, elapsed: 0 };
let workoutConfig = null;
let activeSource = "";
let activeContextKey = "";
let pendingLoadId = 0;
const urlCache = {};

const timeline = buildTimeline();
const totalDurationMs = timeline.reduce((sum, segment) => sum + (segment.duration * 1000), 0);

function buildTimeline() {
  const segments = [
    { kind: "video", duration: 180, label: "WARMUP", directVideoConfigKey: "warmupPath" }
  ];

  for (let blockIndex = 0; blockIndex < 6; blockIndex += 1) {
    for (let roundIndex = 1; roundIndex <= 3; roundIndex += 1) {
      segments.push({
        kind: "video",
        duration: 45,
        blockIndex,
        roundIndex,
        label: `ROUND ${roundIndex} OF 3`
      });

      segments.push({
        kind: "rest",
        duration: 15,
        blockIndex,
        roundIndex,
        label: "REST"
      });
    }

    segments.push({
      kind: "break",
      duration: 60,
      blockIndex,
      label: "BREAK"
    });
  }

  segments.push({
    kind: "video",
    duration: 180,
    label: "STRETCH",
    directVideoConfigKey: "cooldownPath"
  });

  return segments;
}

function getElapsedMs() {
  const raw = state.paused
    ? (state.elapsed || 0)
    : (Date.now() - (state.startTime || Date.now()));

  return Math.max(0, Math.min(raw, totalDurationMs));
}

function locateSegment(elapsedMs) {
  if (elapsedMs >= totalDurationMs) {
    const lastIndex = timeline.length - 1;
    return {
      index: lastIndex,
      segment: timeline[lastIndex],
      segmentElapsedMs: timeline[lastIndex].duration * 1000,
      finished: true
    };
  }

  let cursor = 0;

  for (let i = 0; i < timeline.length; i += 1) {
    const size = timeline[i].duration * 1000;

    if (elapsedMs < cursor + size) {
      return {
        index: i,
        segment: timeline[i],
        segmentElapsedMs: elapsedMs - cursor,
        finished: false
      };
    }

    cursor += size;
  }

  return {
    index: timeline.length - 1,
    segment: timeline[timeline.length - 1],
    segmentElapsedMs: 0,
    finished: false
  };
}

function getVideoPathForSegment(segment) {
  if (!workoutConfig) return null;

  if (segment.directVideoConfigKey) {
    return workoutConfig[segment.directVideoConfigKey] || null;
  }

  const blocks = workoutConfig.blocks || [];
  const blockMap = blocks[segment.blockIndex];

  if (!blockMap || !blockMap[screenIndex]) return null;
  return blockMap[screenIndex];
}

async function getVideoUrlFromPath(path) {
  if (!path) return null;
  if (urlCache[path]) return urlCache[path];

  const url = await storage.ref(path).getDownloadURL();
  urlCache[path] = url;
  return url;
}

function getNextVideoInfo(fromIndex) {
  for (let i = fromIndex + 1; i < timeline.length; i += 1) {
    if (timeline[i].kind === "video") {
      return { index: i, segment: timeline[i] };
    }
  }
  return null;
}

async function buildMediaRequest(info) {
  const { index, segment, segmentElapsedMs, finished } = info;
  const remain = Math.max(0, segment.duration - Math.floor(segmentElapsedMs / 1000));

  if (segment.kind === "rest") {
    return {
      showVideo: false,
      centerText: "REST",
      labelText: segment.label,
      remain
    };
  }

  if (segment.kind === "break") {
    if (remain <= 15) {
      const nextVideoInfo = getNextVideoInfo(index);

      if (nextVideoInfo) {
        const nextPath = getVideoPathForSegment(nextVideoInfo.segment);
        const nextUrl = await getVideoUrlFromPath(nextPath);

        if (nextUrl) {
          return {
            showVideo: true,
            sourceUrl: nextUrl,
            contextKey: `preview:${index}`,
            seekSeconds: 0,
            shouldPlay: !state.paused && !finished,
            centerText: "UPCOMING\nMOVEMENT",
            labelText: "BREAK",
            remain
          };
        }
      }
    }

    return {
      showVideo: false,
      centerText: "BREAK",
      labelText: "BREAK",
      remain
    };
  }

  const videoPath = getVideoPathForSegment(segment);
  const sourceUrl = await getVideoUrlFromPath(videoPath);

  return {
    showVideo: !!sourceUrl,
    sourceUrl,
    contextKey: `segment:${index}:${videoPath || "missing"}`,
    seekSeconds: segmentElapsedMs / 1000,
    shouldPlay: !state.paused && !finished,
    centerText: sourceUrl ? "" : "MISSING\nVIDEO",
    labelText: segment.label,
    remain
  };
}

function clampSeek(seconds) {
  if (Number.isFinite(video.duration) && video.duration > 0) {
    return Math.max(0, Math.min(seconds, Math.max(0, video.duration - 0.1)));
  }
  return Math.max(0, seconds);
}

function seekVideo(seconds) {
  if (!Number.isFinite(seconds)) return;

  try {
    video.currentTime = clampSeek(seconds);
  } catch (error) {}
}

function safePlay() {
  video.play().catch(() => {});
}

function loadSource(request) {
  pendingLoadId += 1;
  const loadId = pendingLoadId;

  const ready = () => {
    video.removeEventListener("loadedmetadata", ready);
    video.removeEventListener("canplay", ready);

    if (loadId !== pendingLoadId) return;

    seekVideo(request.seekSeconds);

    if (request.shouldPlay) safePlay();
    else video.pause();
  };

  video.pause();
  video.addEventListener("loadedmetadata", ready);
  video.addEventListener("canplay", ready);
  video.src = request.sourceUrl;
  video.load();
}

function syncVideo(request) {
  const sourceChanged = request.sourceUrl !== activeSource;
  const contextChanged = request.contextKey !== activeContextKey;

  activeContextKey = request.contextKey;
  video.loop = true;

  if (sourceChanged) {
    activeSource = request.sourceUrl;
    loadSource(request);
    return;
  }

  if (contextChanged) {
    seekVideo(request.seekSeconds);
  }

  if (request.shouldPlay) {
    if (video.paused) safePlay();
  } else {
    video.pause();
  }
}

let renderToken = 0;

async function render() {
  const myToken = ++renderToken;

  if (!workoutConfig) {
    label.innerText = `SCREEN ${screenNumber}`;
    timer.innerText = "--:--";
    center.innerText = "LOADING\nWORKOUT";
    center.style.display = "block";
    video.pause();
    video.style.display = "none";
    return;
  }

  const info = locateSegment(getElapsedMs());
  const request = await buildMediaRequest(info);

  if (myToken !== renderToken) return;

  label.innerText = request.labelText;
  timer.innerText = format(request.remain);
  center.innerText = request.centerText || "";
  center.style.display = request.centerText ? "block" : "none";

  if (!request.showVideo) {
    video.pause();
    video.style.display = "none";
    return;
  }

  video.style.display = "block";
  syncVideo(request);
}

function format(totalSeconds) {
  const safe = Math.max(0, totalSeconds);
  const minutes = Math.floor(safe / 60);
  const seconds = safe % 60;
  return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
}

db.ref("state").on("value", (snap) => {
  state = { startTime: Date.now(), paused: true, elapsed: 0, ...(snap.val() || {}) };
  render();
});

db.ref("workoutConfig").on("value", (snap) => {
  workoutConfig = snap.val() || null;
  activeSource = "";
  activeContextKey = "";
  render();
});

render();
setInterval(render, 250);
</script>

</body>
</html>
