<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Display</title>
<style>
html,body{
  margin:0;
  height:100%;
  background:#000;
  color:#fff;
  font-family:Arial,sans-serif;
  overflow:hidden;
}

/* Main video area */
#videoArea{
  position:fixed;
  inset:0;
  z-index:1;
  display:none;
  background:#000;
}

#videoArea.single{
  display:block;
}

#videoArea.dual{
  display:flex;
  gap:0;
}

.videoWrap{
  position:relative;
  height:100%;
  background:#000;
  overflow:hidden;
}

#videoArea.single .videoWrap{
  width:100%;
}

#videoArea.dual .videoWrap{
  width:50%;
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
  background:#000;
}

#videoArea.dual .videoWrap:first-child{
  border-right:3px solid rgba(255,255,255,.35);
}

.videoName{
  position:absolute;
  left:20px;
  bottom:20px;
  z-index:10;
  padding:10px 14px;
  background:rgba(0,0,0,.7);
  border:1px solid rgba(255,255,255,.25);
  border-radius:8px;
  font-size:26px;
  font-weight:bold;
  letter-spacing:.5px;
}

/* Timer / label overlay */
#overlay{
  position:fixed;
  top:20px;
  right:30px;
  z-index:20;
  text-align:right;
  padding:14px 18px;
  background:rgba(0,0,0,.65);
  border:1px solid rgba(255,255,255,.2);
  border-radius:10px;
}

#screenLabel{
  font-size:22px;
  opacity:.8;
}

#label{
  font-size:34px;
  font-weight:bold;
}

#timer{
  font-size:76px;
  line-height:1;
  font-weight:bold;
}

#center{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:30;
  font-size:76px;
  line-height:1.1;
  text-align:center;
  white-space:pre-line;
  text-shadow:0 0 24px rgba(0,0,0,.65);
  display:none;
  font-weight:bold;
}
</style>
</head>
<body>

<div id="videoArea">
  <div class="videoWrap">
    <video id="video1" muted playsinline preload="auto" loop></video>
    <div id="videoName1" class="videoName"></div>
  </div>

  <div class="videoWrap">
    <video id="video2" muted playsinline preload="auto" loop></video>
    <div id="videoName2" class="videoName"></div>
  </div>
</div>

<div id="overlay">
  <div id="screenLabel"></div>
  <div id="label"></div>
  <div id="timer"></div>
</div>

<div id="center"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAR7B5phYOnasZkBQyqut56i_DKA8HFJz0",
  authDomain: "timer-app-30e7d.firebaseapp.com",
  databaseURL: "https://timer-app-30e7d-default-rtdb.firebaseio.com",
  projectId: "timer-app-30e7d",
  storageBucket: "timer-app-30e7d.firebasestorage.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const storage = firebase.storage();

const params = new URLSearchParams(window.location.search);
const requestedScreen = parseInt(params.get("screen"), 10);
const screenNumber = requestedScreen >= 1 && requestedScreen <= 3 ? requestedScreen : 1;
const screenIndex = screenNumber - 1;

const videoArea = document.getElementById("videoArea");
const video1 = document.getElementById("video1");
const video2 = document.getElementById("video2");
const videos = [video1, video2];

const videoName1 = document.getElementById("videoName1");
const videoName2 = document.getElementById("videoName2");
const videoNames = [videoName1, videoName2];

const screenLabel = document.getElementById("screenLabel");
const label = document.getElementById("label");
const timer = document.getElementById("timer");
const center = document.getElementById("center");

let state = { startTime: Date.now(), paused: true, elapsed: 0 };
let workoutConfig = null;

let activeSources = ["", ""];
let activeContextKeys = ["", ""];
let pendingLoadIds = [0, 0];

const urlCache = {};
let renderToken = 0;

function defaultWorkoutConfig() {
  return {
    warmupSeconds: 180,
    cooldownSeconds: 180,
    warmupPath: "",
    cooldownPath: "",
    blocks: Array.from({ length: 6 }, () => ({
      workSeconds: 45,
      restSeconds: 15,
      rounds: 3,
      breakSeconds: 60,
      stations: [
        ["", ""],
        ["", ""],
        ["", ""]
      ]
    }))
  };
}

function normalizeConfig(config) {
  const base = defaultWorkoutConfig();
  const incoming = config || {};

  const normalized = {
    ...base,
    ...incoming,
    blocks: []
  };

  for (let i = 0; i < 6; i += 1) {
    const oldBlock = incoming.blocks?.[i];

    if (Array.isArray(oldBlock)) {
      normalized.blocks.push({
        ...base.blocks[i],
        stations: [
          [oldBlock[0] || "", ""],
          [oldBlock[1] || "", ""],
          [oldBlock[2] || "", ""]
        ]
      });
    } else {
      normalized.blocks.push({
        ...base.blocks[i],
        ...(oldBlock || {}),
        stations: [
          [
            oldBlock?.stations?.[0]?.[0] || "",
            oldBlock?.stations?.[0]?.[1] || ""
          ],
          [
            oldBlock?.stations?.[1]?.[0] || "",
            oldBlock?.stations?.[1]?.[1] || ""
          ],
          [
            oldBlock?.stations?.[2]?.[0] || "",
            oldBlock?.stations?.[2]?.[1] || ""
          ]
        ]
      });
    }
  }

  return normalized;
}

function buildTimeline() {
  const config = workoutConfig || defaultWorkoutConfig();
  const segments = [];

  segments.push({
    kind: "singleVideo",
    duration: Number(config.warmupSeconds) || 180,
    label: "WARMUP",
    directVideoConfigKey: "warmupPath"
  });

  config.blocks.forEach((block, blockIndex) => {
    const rounds = Number(block.rounds) || 3;
    const workSeconds = Number(block.workSeconds) || 45;
    const restSeconds = Number(block.restSeconds) || 15;
    const breakSeconds = Number(block.breakSeconds) || 60;

    for (let roundIndex = 1; roundIndex <= rounds; roundIndex += 1) {
      segments.push({
        kind: "dualVideo",
        duration: workSeconds,
        blockIndex,
        roundIndex,
        rounds,
        label: `ROUND ${roundIndex} OF ${rounds}`
      });

      segments.push({
        kind: "rest",
        duration: restSeconds,
        blockIndex,
        roundIndex,
        rounds,
        label: "REST"
      });
    }

    if (breakSeconds > 0) {
      segments.push({
        kind: "break",
        duration: breakSeconds,
        blockIndex,
        label: "BREAK"
      });
    }
  });

  segments.push({
    kind: "singleVideo",
    duration: Number(config.cooldownSeconds) || 180,
    label: "STRETCH",
    directVideoConfigKey: "cooldownPath"
  });

  return segments;
}

function getTimeline() {
  return buildTimeline();
}

function getTotalDurationMs() {
  return getTimeline().reduce((sum, segment) => sum + (segment.duration * 1000), 0);
}

function getElapsedMs() {
  const totalDurationMs = getTotalDurationMs();

  const raw = state.paused
    ? (state.elapsed || 0)
    : (Date.now() - (state.startTime || Date.now()));

  return Math.max(0, Math.min(raw, totalDurationMs));
}

function locateSegment(elapsedMs) {
  const timeline = getTimeline();
  const totalDurationMs = getTotalDurationMs();

  if (elapsedMs >= totalDurationMs) {
    const lastIndex = timeline.length - 1;
    return {
      index: lastIndex,
      segment: timeline[lastIndex],
      segmentElapsedMs: timeline[lastIndex].duration * 1000,
      finished: true
    };
  }

  let cursor = 0;

  for (let i = 0; i < timeline.length; i += 1) {
    const size = timeline[i].duration * 1000;

    if (elapsedMs < cursor + size) {
      return {
        index: i,
        segment: timeline[i],
        segmentElapsedMs: elapsedMs - cursor,
        finished: false
      };
    }

    cursor += size;
  }

  return {
    index: timeline.length - 1,
    segment: timeline[timeline.length - 1],
    segmentElapsedMs: 0,
    finished: false
  };
}

function getSingleVideoPath(segment) {
  if (!workoutConfig) return null;
  if (!segment.directVideoConfigKey) return null;
  return workoutConfig[segment.directVideoConfigKey] || null;
}

function getDualVideoPaths(segment) {
  if (!workoutConfig) return ["", ""];

  const block = workoutConfig.blocks?.[segment.blockIndex];
  const station = block?.stations?.[screenIndex];

  if (!station) return ["", ""];

  return [
    station[0] || "",
    station[1] || ""
  ];
}

async function getVideoUrlFromPath(path) {
  if (!path) return null;
  if (urlCache[path]) return urlCache[path];

  const url = await storage.ref(path).getDownloadURL();
  urlCache[path] = url;
  return url;
}

function getNextVideoInfo(fromIndex) {
  const timeline = getTimeline();

  for (let i = fromIndex + 1; i < timeline.length; i += 1) {
    if (timeline[i].kind === "dualVideo" || timeline[i].kind === "singleVideo") {
      return { index: i, segment: timeline[i] };
    }
  }

  return null;
}

function cleanNameFromPath(path) {
  if (!path) return "";
  const fileName = decodeURIComponent(path.split("/").pop() || path);
  return fileName.replace(/\.[^/.]+$/, "");
}

async function buildMediaRequest(info) {
  const { index, segment, segmentElapsedMs, finished } = info;
  const remain = Math.max(0, segment.duration - Math.floor(segmentElapsedMs / 1000));

  if (segment.kind === "rest") {
    return {
      mode: "none",
      centerText: "REST",
      labelText: "REST",
      remain
    };
  }

  if (segment.kind === "break") {
    if (remain <= 15) {
      const nextVideoInfo = getNextVideoInfo(index);

      if (nextVideoInfo) {
        const nextSegment = nextVideoInfo.segment;

        if (nextSegment.kind === "dualVideo") {
          const paths = getDualVideoPaths(nextSegment);
          const urls = await Promise.all(paths.map(path => getVideoUrlFromPath(path)));

          if (urls[0] || urls[1]) {
            return {
              mode: "dual",
              sourceUrls: urls,
              paths,
              contextKey: `preview:${index}:${paths.join("|")}`,
              seekSeconds: 0,
              shouldPlay: !state.paused && !finished,
              centerText: "UPCOMING\nMOVEMENTS",
              labelText: "BREAK",
              remain
            };
          }
        }

        if (nextSegment.kind === "singleVideo") {
          const path = getSingleVideoPath(nextSegment);
          const url = await getVideoUrlFromPath(path);

          if (url) {
            return {
              mode: "single",
              sourceUrls: [url, null],
              paths: [path, ""],
              contextKey: `preview:${index}:${path}`,
              seekSeconds: 0,
              shouldPlay: !state.paused && !finished,
              centerText: "UPCOMING\nMOVEMENT",
              labelText: "BREAK",
              remain
            };
          }
        }
      }
    }

    return {
      mode: "none",
      centerText: "BREAK",
      labelText: "BREAK",
      remain
    };
  }

  if (segment.kind === "singleVideo") {
    const path = getSingleVideoPath(segment);
    const url = await getVideoUrlFromPath(path);

    return {
      mode: url ? "single" : "none",
      sourceUrls: [url, null],
      paths: [path || "", ""],
      contextKey: `segment:${index}:${path || "missing"}`,
      seekSeconds: segmentElapsedMs / 1000,
      shouldPlay: !state.paused && !finished,
      centerText: url ? "" : "MISSING\nVIDEO",
      labelText: segment.label,
      remain
    };
  }

  if (segment.kind === "dualVideo") {
    const paths = getDualVideoPaths(segment);
    const urls = await Promise.all(paths.map(path => getVideoUrlFromPath(path)));

    return {
      mode: (urls[0] || urls[1]) ? "dual" : "none",
      sourceUrls: urls,
      paths,
      contextKey: `segment:${index}:${paths.join("|")}`,
      seekSeconds: segmentElapsedMs / 1000,
      shouldPlay: !state.paused && !finished,
      centerText: (urls[0] || urls[1]) ? "" : "MISSING\nVIDEOS",
      labelText: segment.label,
      remain
    };
  }

  return {
    mode: "none",
    centerText: "",
    labelText: "",
    remain
  };
}

function clampSeek(video, seconds) {
  if (Number.isFinite(video.duration) && video.duration > 0) {
    return Math.max(0, Math.min(seconds, Math.max(0, video.duration - 0.1)));
  }

  return Math.max(0, seconds);
}

function seekVideo(video, seconds) {
  if (!Number.isFinite(seconds)) return;

  try {
    video.currentTime = clampSeek(video, seconds);
  } catch (error) {}
}

function safePlay(video) {
  if (!video) return;
  video.play().catch(() => {});
}

function stopUnusedVideos(activeCount) {
  videos.forEach((video, i) => {
    if (i >= activeCount) {
      video.pause();
      video.removeAttribute("src");
      video.load();
      activeSources[i] = "";
      activeContextKeys[i] = "";
      videoNames[i].innerText = "";
    }
  });
}

function loadSource(slotIndex, request, sourceUrl) {
  const video = videos[slotIndex];

  pendingLoadIds[slotIndex] += 1;
  const loadId = pendingLoadIds[slotIndex];

  const ready = () => {
    video.removeEventListener("loadedmetadata", ready);
    video.removeEventListener("canplay", ready);

    if (loadId !== pendingLoadIds[slotIndex]) return;

    seekVideo(video, request.seekSeconds);

    if (request.shouldPlay) safePlay(video);
    else video.pause();
  };

  video.pause();
  video.addEventListener("loadedmetadata", ready);
  video.addEventListener("canplay", ready);
  video.src = sourceUrl;
  video.load();
}

function syncVideoSlot(slotIndex, request, sourceUrl) {
  const video = videos[slotIndex];

  if (!sourceUrl) {
    video.pause();
    video.removeAttribute("src");
    video.load();
    activeSources[slotIndex] = "";
    activeContextKeys[slotIndex] = "";
    return;
  }

  const slotContextKey = `${request.contextKey}:slot${slotIndex}`;
  const sourceChanged = sourceUrl !== activeSources[slotIndex];
  const contextChanged = slotContextKey !== activeContextKeys[slotIndex];

  activeContextKeys[slotIndex] = slotContextKey;
  video.loop = true;

  if (sourceChanged) {
    activeSources[slotIndex] = sourceUrl;
    loadSource(slotIndex, request, sourceUrl);
    return;
  }

  if (contextChanged) {
    seekVideo(video, request.seekSeconds);
  }

  if (request.shouldPlay) {
    if (video.paused) safePlay(video);
  } else {
    video.pause();
  }
}

function syncVideos(request) {
  const activeCount = request.mode === "dual" ? 2 : 1;

  stopUnusedVideos(activeCount);

  for (let i = 0; i < activeCount; i += 1) {
    syncVideoSlot(i, request, request.sourceUrls?.[i]);
  }
}

function setVideoLayout(request) {
  videoArea.className = "";

  if (request.mode === "none") {
    videoArea.style.display = "none";
    videos.forEach(video => video.pause());
    videoNames.forEach(name => name.innerText = "");
    return;
  }

  videoArea.style.display = "";
  videoArea.classList.add(request.mode);

  videoName1.innerText = cleanNameFromPath(request.paths?.[0]);
  videoName2.innerText = request.mode === "dual" ? cleanNameFromPath(request.paths?.[1]) : "";
}

async function render() {
  const myToken = ++renderToken;

  if (!workoutConfig) {
    screenLabel.innerText = `SCREEN ${screenNumber}`;
    label.innerText = "";
    timer.innerText = "--:--";
    center.innerText = "LOADING\nWORKOUT";
    center.style.display = "block";
    videoArea.style.display = "none";
    videos.forEach(video => video.pause());
    return;
  }

  const info = locateSegment(getElapsedMs());
  const request = await buildMediaRequest(info);

  if (myToken !== renderToken) return;

  screenLabel.innerText = `SCREEN ${screenNumber}`;
  label.innerText = request.labelText;
  timer.innerText = format(request.remain);
  center.innerText = request.centerText || "";
  center.style.display = request.centerText ? "block" : "none";

  setVideoLayout(request);

  if (request.mode !== "none") {
    syncVideos(request);
  }
}

function format(totalSeconds) {
  const safe = Math.max(0, totalSeconds);
  const minutes = Math.floor(safe / 60);
  const seconds = safe % 60;
  return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
}

db.ref("state").on("value", (snap) => {
  state = { startTime: Date.now(), paused: true, elapsed: 0, ...(snap.val() || {}) };
  render();
});

db.ref("workoutConfig").on("value", (snap) => {
  workoutConfig = normalizeConfig(snap.val());
  activeSources = ["", ""];
  activeContextKeys = ["", ""];
  render();
});

render();
setInterval(render, 250);
</script>

</body>
</html>
